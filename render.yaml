services:
  - type: web
    name: thunder-booking
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    disk:
      name: thunder-storage
      mountPath: /var/www/html/storage/app/public
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: Thunder Booking
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:U2vDul440TTveWzczJp8AlHPUtzjEqeK8ubkWMDHMV0=
      - key: APP_TIMEZONE
        value: Asia/Thimphu
      - key: APP_URL
        value: https://thunderbooking.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: thunder-booking-db
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: errorlog
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: thunderbooking975@gmail.com
      - key: MAIL_PASSWORD
        value: xsmtpsib-a9805647e62a341e799e8a76c98f5be19E1c91634195d2125489416b1a6e49d1c3b19ad7d1d8de1d1a14449d75d88f5a
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: thunderbooking975@gmail.com
      - key: MAIL_FROM_NAME
        value: Thunder Booking

databases:
  - name: thunder-booking-db
    databaseName: thunder_booking
    user: thunder_booking_user
